
<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>தொடர்பு கொள்ள | Contact Us</title>
    <!-- Google Fonts -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { background-color: #f4f7f9; color: #333; }

        .contact-container {
            max-width: 1100px;
            margin: 50px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
        }

        /* இடது பக்கம்: தகவல் பகுதி */
        .contact-info {
            background: #007bff;
            color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .contact-info h2 { margin-bottom: 20px; font-size: 24px; }
        .contact-info p { margin-bottom: 15px; font-size: 16px; opacity: 0.9; }
        .contact-details { margin-top: 30px; }
        .detail-item { margin-bottom: 20px; }
        .detail-item strong { display: block; font-size: 18px; }

        /* வலது பக்கம்: படிவம் பகுதி */
        .contact-form-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .contact-form-card h2 { margin-bottom: 25px; color: #007bff; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        .form-group input:focus, .form-group textarea:focus { border-color: #007bff; }

        .submit-btn {
            background: #28a745;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .submit-btn:hover { background: #218838; }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .contact-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="contact-container">
        <!-- மருத்துவமனை தகவல் -->
        <div class="contact-info">
            <h2>எங்களைத் தொடர்பு கொள்ள</h2>
            <p>உங்களுக்கு ஏதேனும் அவசர உதவி அல்லது சந்தேகங்கள் இருந்தால் எப்போது வேண்டுமானாலும் அழைக்கலாம்.</p>
            
            <div class="contact-details">
                <div class="detail-item">
                    <strong>முகவரி:</strong>
                    231 New Road <br> Kalmunai
                </div>
                <div class="detail-item">
                    <strong>தொலைபேசி:</strong>
                    +94 7278 45956 
                </div>
                <div class="detail-item">
                    <strong>மின்னஞ்சல்:</strong>
                    anasabdulanas@gmail.com
                </div>
                <div class="detail-item">
                    <strong>நேரம்:</strong>
                    24/7 அவசரச் சிகிச்சை கிடைக்கும்
                </div>
            </div>
        </div>

        <!-- தொடர்பு படிவம் -->
        <div class="contact-form-card">
            <h2>சந்தேகங்களை அனுப்பவும்</h2>
            <form action="#">
                <div class="form-group">
                    <label>உங்கள் பெயர்</label>
                    <input type="text" placeholder="பெயரை உள்ளிடவும்" required>
                </div>
                <div class="form-group">
                    <label>மின்னஞ்சல் முகவரி</label>
                    <input type="email" placeholder="anasabdulanas@mail.com" required>
                </div>
                <div class="form-group">
                    <label>தொலைபேசி எண்</label>
                    <input type="tel" placeholder="+947278XXXXX" required>
                </div>
                <div class="form-group">
                    <label>உங்கள் செய்தி</label>
                    <textarea rows="5" placeholder="உங்கள் கேள்வியை இங்கே கேட்கவும்..."></textarea>
                </div>
                <button type="submit" class="submit-btn">அனுப்புக</button>
            </form>
        </div>
    </div>

</body>
</html>
